name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

  audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: smoke-gate audit (dogfood)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node dist/cli.js audit --llm none --since origin/${{ github.base_ref }} --out audit-report.md
          else
            node dist/cli.js audit --llm none --out audit-report.md
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-report.md
